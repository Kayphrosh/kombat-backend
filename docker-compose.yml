version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wager_db
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  # Wager API
  api:
    build: .
    restart: on-failure
    depends_on:
      - db
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgres://user:password@db:5432/wager_db
      DYNAMIC_ENVIRONMENT_ID: ${DYNAMIC_ENVIRONMENT_ID}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      SUI_NETWORK: ${SUI_NETWORK:-testnet}
      SUI_TESTNET_RPC_URL: ${SUI_TESTNET_RPC_URL:-https://fullnode.testnet.sui.io:443}
      SUI_MAINNET_RPC_URL: ${SUI_MAINNET_RPC_URL:-https://fullnode.mainnet.sui.io:443}
      SUI_TESTNET_PACKAGE_ID: ${SUI_TESTNET_PACKAGE_ID:-}
      SUI_MAINNET_PACKAGE_ID: ${SUI_MAINNET_PACKAGE_ID:-}
      SUI_TESTNET_USDC_COIN_TYPE: ${SUI_TESTNET_USDC_COIN_TYPE:-0xa1ec7fc00a6f40db9693ad1415d0c193ad3906494428cf252621037bd7117e29::usdc::USDC}
      SUI_MAINNET_USDC_COIN_TYPE: ${SUI_MAINNET_USDC_COIN_TYPE:-0xdba34672e30cb065b1f93e3ab55318768fd6fef66c15942c9f7cb846e2f900e7::usdc::USDC}
      SUI_STAKING_MODULE: ${SUI_STAKING_MODULE:-tournament_staking}
      RAMP_PRIMARY_PROVIDER: ${RAMP_PRIMARY_PROVIDER:-dynamic_native}
      DYNAMIC_ONRAMP_ENABLED: ${DYNAMIC_ONRAMP_ENABLED:-true}
      MANUAL_CRYPTO_DEPOSIT_ENABLED: ${MANUAL_CRYPTO_DEPOSIT_ENABLED:-true}
      RAMP_DEFAULT_NETWORK: ${RAMP_DEFAULT_NETWORK:-sui}
      RAMP_DEFAULT_CRYPTO_CURRENCY: ${RAMP_DEFAULT_CRYPTO_CURRENCY:-USDC}
      RAMP_DEFAULT_FIAT_CURRENCY: ${RAMP_DEFAULT_FIAT_CURRENCY:-USD}
      RAMP_PARTNER_FEE_BPS: ${RAMP_PARTNER_FEE_BPS:-0}
      TRANSAK_API_KEY: ${TRANSAK_API_KEY:-}
      TRANSAK_PARTNER_API_KEY: ${TRANSAK_PARTNER_API_KEY:-}
      TRANSAK_ENVIRONMENT: ${TRANSAK_ENVIRONMENT:-production}
      TRANSAK_REFERRER_DOMAIN: ${TRANSAK_REFERRER_DOMAIN:-localhost}
      TRANSAK_DEFAULT_NETWORK: ${TRANSAK_DEFAULT_NETWORK:-sui}
      TRANSAK_DEFAULT_CRYPTO_CURRENCY: ${TRANSAK_DEFAULT_CRYPTO_CURRENCY:-USDC}
      TRANSAK_DEFAULT_FIAT_CURRENCY: ${TRANSAK_DEFAULT_FIAT_CURRENCY:-USD}
      TRANSAK_PARTNER_FEE_BPS: ${TRANSAK_PARTNER_FEE_BPS:-0}
      GRID_ENABLED: ${GRID_ENABLED:-true}
      GRID_API_KEY: ${GRID_API_KEY:-}
      GRID_BASE_URL: ${GRID_BASE_URL:-https://api.grid.gg}
      GRID_MATCHES_PATH: ${GRID_MATCHES_PATH:-/matches}
      GRID_AUTH_HEADER: ${GRID_AUTH_HEADER:-x-api-key}
      GRID_DEFAULT_STATUSES: ${GRID_DEFAULT_STATUSES:-upcoming,running}
      GRID_VIDEOGAME_SLUGS: ${GRID_VIDEOGAME_SLUGS:-lol,csgo,dota2,valorant}
      GRID_PER_PAGE: ${GRID_PER_PAGE:-100}
      GRID_MAX_PAGES: ${GRID_MAX_PAGES:-3}
      PORT: 3000
      RUST_LOG: wager_api=debug,tower_http=debug

volumes:
  db_data:
